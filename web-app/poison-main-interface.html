<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poison Candy Duel - Alchemist's Lair</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&family=Butcherman&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            font-family: 'Butcherman', cursive;
            cursor: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjQiIGhlaWdodD0iMjQiIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHBhdGggZD0iTTEyIDJMMTMuMDkgOC4yNkwyMCA5TDEzLjA5IDE1Ljc0TDEyIDIyTDEwLjkxIDE1Ljc0TDQgOUwxMC45MSA4LjI2TDEyIDJaIiBzdHJva2U9IiMwMGZmMDAiIHN0cm9rZS13aWR0aD0iMiIgZmlsbD0iIzAwNDQwMCIvPgo8L3N2Zz4K'), auto;
        }

        /* Background Layer */
        .poison-lair {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 100, 0, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(139, 0, 139, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 50% 20%, rgba(255, 0, 255, 0.1) 0%, transparent 40%),
                linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 25%, #16213e 50%, #0f0f23 75%, #000000 100%);
            animation: backgroundShift 20s ease-in-out infinite alternate;
        }

        @keyframes backgroundShift {
            0% { filter: hue-rotate(0deg) brightness(0.8); }
            50% { filter: hue-rotate(30deg) brightness(1.1); }
            100% { filter: hue-rotate(0deg) brightness(0.9); }
        }

        /* Animated Mist Layer */
        .toxic-mist {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 10% 80%, rgba(0, 255, 0, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse at 90% 20%, rgba(255, 0, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 90%, rgba(0, 100, 0, 0.12) 0%, transparent 70%);
            animation: mistFloat 15s ease-in-out infinite;
            opacity: 0.6;
        }

        @keyframes mistFloat {
            0%, 100% { transform: translateY(0px) scale(1); opacity: 0.6; }
            25% { transform: translateY(-20px) scale(1.05); opacity: 0.8; }
            50% { transform: translateY(-10px) scale(0.95); opacity: 0.4; }
            75% { transform: translateY(-30px) scale(1.02); opacity: 0.7; }
        }

        /* Poison Drip Animation */
        .poison-drips {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .drip {
            position: absolute;
            width: 4px;
            height: 20px;
            background: linear-gradient(to bottom, rgba(0, 255, 0, 0.8), rgba(0, 255, 0, 0.1));
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: drip-fall 8s linear infinite;
        }

        @keyframes drip-fall {
            0% { 
                transform: translateY(-100px);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 0.8; }
            100% { 
                transform: translateY(calc(100vh + 100px));
                opacity: 0;
            }
        }

        /* Thorny Border */
        .thorn-border {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 8px solid transparent;
            border-image: linear-gradient(45deg, 
                rgba(0, 255, 0, 0.3) 0%,
                rgba(139, 0, 139, 0.4) 25%,
                rgba(255, 0, 255, 0.3) 50%,
                rgba(0, 100, 0, 0.4) 75%,
                rgba(0, 255, 0, 0.3) 100%
            ) 8;
            animation: thornPulse 3s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes thornPulse {
            0% { filter: brightness(0.8) drop-shadow(0 0 10px rgba(0, 255, 0, 0.3)); }
            100% { filter: brightness(1.2) drop-shadow(0 0 20px rgba(0, 255, 0, 0.6)); }
        }

        /* Game Title */
        .game-title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 1000;
        }

        .title-text {
            font-family: 'Nosifer', cursive;
            font-size: clamp(2rem, 5vw, 4rem);
            color: #00ff00;
            text-shadow: 
                0 0 10px #00ff00,
                0 0 20px #00ff00,
                0 0 30px #00ff00,
                3px 3px 0px #000,
                -3px -3px 0px #000;
            animation: titleFlicker 4s ease-in-out infinite;
            margin-bottom: 10px;
        }

        @keyframes titleFlicker {
            0%, 90%, 100% { opacity: 1; text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00, 0 0 30px #00ff00, 3px 3px 0px #000, -3px -3px 0px #000; }
            5%, 15%, 25% { opacity: 0.8; text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00, 0 0 15px #00ff00, 3px 3px 0px #000, -3px -3px 0px #000; }
        }

        .subtitle {
            font-family: 'Creepster', cursive;
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            color: #8b008b;
            text-shadow: 0 0 8px #8b008b, 2px 2px 0px #000;
            animation: subtitleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes subtitleGlow {
            0% { text-shadow: 0 0 8px #8b008b, 2px 2px 0px #000; }
            100% { text-shadow: 0 0 15px #8b008b, 0 0 25px #8b008b, 2px 2px 0px #000; }
        }

        /* Score HUD */
        .score-hud {
            position: fixed;
            top: 120px;
            right: 30px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff00;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 
                0 0 20px rgba(0, 255, 0, 0.5),
                inset 0 0 20px rgba(0, 255, 0, 0.1);
            animation: hudFloat 6s ease-in-out infinite;
            z-index: 1000;
        }

        @keyframes hudFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }

        .score-item {
            display: flex;
            align-items: center;
            margin: 10px 0;
            font-size: 1.1rem;
            color: #00ff00;
            text-shadow: 0 0 5px #00ff00;
        }

        .score-icon {
            width: 24px;
            height: 24px;
            margin-right: 10px;
            background: radial-gradient(circle, #00ff00 30%, transparent 70%);
            border-radius: 50%;
            animation: scoreOrbit 4s linear infinite;
            position: relative;
        }

        .score-icon::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            background: radial-gradient(circle, rgba(0, 255, 0, 0.8), transparent);
            border-radius: 50%;
            animation: scorePulse 2s ease-in-out infinite;
        }

        @keyframes scoreOrbit {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes scorePulse {
            0%, 100% { opacity: 0.6; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .score-number {
            font-weight: bold;
            animation: numberDrip 3s ease-in-out infinite;
        }

        @keyframes numberDrip {
            0%, 90%, 100% { 
                filter: drop-shadow(0 2px 0 #004400) drop-shadow(0 4px 0 #002200);
            }
            5%, 15% { 
                filter: drop-shadow(0 4px 0 #004400) drop-shadow(0 6px 0 #002200) drop-shadow(0 8px 0 #001100);
            }
        }

        /* Progress Bar */
        .progress-container {
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #8b008b;
            border-radius: 10px;
            overflow: hidden;
            height: 12px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, 
                #00ff00 0%, 
                #8b008b 50%, 
                #ff00ff 100%);
            width: 67%;
            animation: progressBubble 4s ease-in-out infinite;
            border-radius: 10px;
        }

        @keyframes progressBubble {
            0%, 100% { 
                box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.3);
            }
            50% { 
                box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.6);
                filter: brightness(1.3);
            }
        }

        /* Central Cauldron */
        .central-cauldron {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            background: 
                radial-gradient(circle at 30% 30%, rgba(0, 255, 0, 0.8) 0%, rgba(0, 100, 0, 0.6) 40%, rgba(0, 50, 0, 0.9) 100%);
            border: 4px solid #8b008b;
            border-radius: 50%;
            box-shadow: 
                0 0 30px rgba(0, 255, 0, 0.7),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
            animation: cauldronBubble 3s ease-in-out infinite;
            z-index: 100;
            cursor: pointer;
        }

        @keyframes cauldronBubble {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(1);
                box-shadow: 0 0 30px rgba(0, 255, 0, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.2);
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.1);
                box-shadow: 0 0 50px rgba(0, 255, 0, 1), inset 0 0 30px rgba(255, 255, 255, 0.4);
            }
        }

        .cauldron-steam {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 40px;
            background: linear-gradient(to top, 
                rgba(255, 255, 255, 0.8) 0%, 
                rgba(0, 255, 0, 0.4) 50%, 
                transparent 100%);
            border-radius: 50%;
            animation: steamRise 2s ease-in-out infinite;
        }

        @keyframes steamRise {
            0% { 
                opacity: 0.8; 
                transform: translateX(-50%) translateY(0px) scale(1);
            }
            100% { 
                opacity: 0; 
                transform: translateX(-50%) translateY(-30px) scale(1.5);
            }
        }

        /* Hexagonal Button Layout */
        .button-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
        }

        .poison-button {
            position: absolute;
            width: 100px;
            height: 100px;
            background: 
                linear-gradient(145deg, rgba(0, 0, 0, 0.8) 0%, rgba(0, 50, 0, 0.6) 50%, rgba(0, 0, 0, 0.9) 100%);
            border: 3px solid #00ff00;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.7rem;
            color: #00ff00;
            text-shadow: 0 0 5px #00ff00;
            text-align: center;
            font-weight: bold;
            box-shadow: 
                0 0 20px rgba(0, 255, 0, 0.3),
                inset 0 0 20px rgba(0, 255, 0, 0.1);
            overflow: hidden;
        }

        .poison-button::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            animation: liquidBubble 4s ease-in-out infinite;
        }

        @keyframes liquidBubble {
            0%, 100% { 
                transform: translateX(-50%) scale(1);
                opacity: 0.8;
            }
            50% { 
                transform: translateX(-50%) scale(1.2);
                opacity: 1;
            }
        }

        .poison-button:hover {
            transform: scale(1.15);
            border-color: #ff00ff;
            box-shadow: 
                0 0 40px rgba(255, 0, 255, 0.8),
                inset 0 0 30px rgba(255, 0, 255, 0.2);
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }

        .poison-button:hover::before {
            animation: hoverBubble 0.5s ease-in-out;
        }

        @keyframes hoverBubble {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.5); }
            100% { transform: translateX(-50%) scale(1.2); }
        }

        /* Button Positions (Hexagonal Layout) */
        .btn-play-online {
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
        }

        .btn-play-online::before {
            background: radial-gradient(circle, #00ff00 30%, rgba(0, 255, 0, 0.3) 70%);
        }

        .btn-play-friends {
            top: 150px;
            right: 80px;
        }

        .btn-play-friends::before {
            background: radial-gradient(circle, #8b008b 30%, rgba(139, 0, 139, 0.3) 70%);
        }

        .btn-play-offline {
            bottom: 150px;
            right: 80px;
        }

        .btn-play-offline::before {
            background: radial-gradient(circle, #ff0000 30%, rgba(255, 0, 0, 0.3) 70%);
        }

        .btn-profile {
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
        }

        .btn-profile::before {
            background: radial-gradient(circle, #ffff00 30%, rgba(255, 255, 0, 0.3) 70%);
        }

        .btn-qcd {
            bottom: 150px;
            left: 80px;
        }

        .btn-qcd::before {
            background: radial-gradient(circle, #00ffff 30%, rgba(0, 255, 255, 0.3) 70%);
            animation: moleculeSpin 2s linear infinite;
        }

        @keyframes moleculeSpin {
            0% { transform: translateX(-50%) rotate(0deg); }
            100% { transform: translateX(-50%) rotate(360deg); }
        }

        .btn-rewards {
            top: 150px;
            left: 80px;
        }

        .btn-rewards::before {
            background: radial-gradient(circle, #ffd700 30%, rgba(255, 215, 0, 0.3) 70%);
            animation: rewardShimmer 3s ease-in-out infinite;
        }

        @keyframes rewardShimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.5) hue-rotate(30deg); }
        }

        .btn-home {
            top: 50%;
            left: 50px;
            transform: translateY(-50%);
        }

        .btn-home::before {
            background: radial-gradient(circle, #228b22 30%, rgba(34, 139, 34, 0.3) 70%);
        }

        .btn-ranking {
            top: 50%;
            right: 50px;
            transform: translateY(-50%);
        }

        .btn-ranking::before {
            background: radial-gradient(circle, #c0c0c0 30%, rgba(192, 192, 192, 0.3) 70%);
        }

        /* Button Labels */
        .button-label {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            white-space: nowrap;
        }

        /* Ingredient Preview */
        .ingredient-preview {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 150px;
            height: 100px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #8b008b;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(139, 0, 139, 0.5);
            z-index: 1000;
        }

        .ingredient-title {
            color: #8b008b;
            font-size: 0.8rem;
            margin-bottom: 10px;
            text-shadow: 0 0 5px #8b008b;
        }

        .ingredient-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
            font-size: 0.7rem;
            color: #00ff00;
        }

        .ingredient-icon {
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #00ff00, transparent);
            border-radius: 50%;
            margin-right: 8px;
            animation: ingredientGlow 2s ease-in-out infinite alternate;
        }

        @keyframes ingredientGlow {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .button-container {
                width: 400px;
                height: 400px;
            }
            
            .poison-button {
                width: 70px;
                height: 70px;
                font-size: 0.6rem;
            }
            
            .central-cauldron {
                width: 80px;
                height: 80px;
            }
            
            .score-hud {
                top: 100px;
                right: 15px;
                padding: 15px;
            }
            
            .ingredient-preview {
                bottom: 15px;
                left: 15px;
                width: 120px;
                height: 80px;
                padding: 10px;
            }
        }

        @media (max-width: 480px) {
            .button-container {
                width: 300px;
                height: 300px;
            }
            
            .poison-button {
                width: 60px;
                height: 60px;
                font-size: 0.5rem;
            }
            
            .central-cauldron {
                width: 60px;
                height: 60px;
            }
        }

        /* Loading Animation */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 1;
            transition: opacity 1s ease-out;
        }

        .loading-cauldron {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #00ff00, #004400);
            border-radius: 50%;
            animation: loadingPulse 2s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes loadingPulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .loading-text {
            color: #00ff00;
            font-size: 1.2rem;
            text-shadow: 0 0 10px #00ff00;
            animation: loadingText 2s ease-in-out infinite;
        }

        @keyframes loadingText {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-overlay" id="loadingScreen">
        <div class="loading-cauldron"></div>
        <div class="loading-text">Brewing Dark Magic...</div>
    </div>

    <!-- Main Poison Lair Interface -->
    <div class="poison-lair"></div>
    
    <!-- Animated Toxic Mist -->
    <div class="toxic-mist"></div>
    
    <!-- Poison Drips -->
    <div class="poison-drips" id="poisonDrips"></div>
    
    <!-- Thorny Border -->
    <div class="thorn-border"></div>
    
    <!-- Game Title -->
    <div class="game-title">
        <div class="title-text">POISON CANDY DUEL</div>
        <div class="subtitle">~ Alchemist's Lair ~</div>
    </div>
    
    <!-- Score HUD -->
    <div class="score-hud">
        <div class="score-item">
            <div class="score-icon"></div>
            <span class="score-number">500</span> Diamonds
        </div>
        <div class="score-item">
            <div class="score-icon"></div>
            <span class="score-number">500</span> Points
        </div>
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </div>
    
    <!-- Central Cauldron -->
    <div class="central-cauldron" onclick="playGame()">
        <div class="cauldron-steam"></div>
        <div class="cauldron-steam" style="animation-delay: 0.5s; left: 40%;"></div>
        <div class="cauldron-steam" style="animation-delay: 1s; left: 60%;"></div>
    </div>
    
    <!-- Hexagonal Button Layout -->
    <div class="button-container">
        <div class="poison-button btn-play-online" onclick="playOnline()">
            <div class="button-label">PLAY ONLINE</div>
        </div>
        
        <div class="poison-button btn-play-friends" onclick="playWithFriends()">
            <div class="button-label">PLAY WITH FRIENDS</div>
        </div>
        
        <div class="poison-button btn-play-offline" onclick="playOffline()">
            <div class="button-label">PLAY OFFLINE</div>
        </div>
        
        <div class="poison-button btn-profile" onclick="showProfile()">
            <div class="button-label">PROFILE</div>
        </div>
        
        <div class="poison-button btn-qcd" onclick="showQCD()">
            <div class="button-label">QCD</div>
        </div>
        
        <div class="poison-button btn-rewards" onclick="showRewards()">
            <div class="button-label">REWARDS</div>
        </div>
        
        <div class="poison-button btn-home" onclick="goHome()">
            <div class="button-label">HOME</div>
        </div>
        
        <div class="poison-button btn-ranking" onclick="showRanking()">
            <div class="button-label">RANKING</div>
        </div>
    </div>
    
    <!-- Ingredient Preview -->
    <div class="ingredient-preview">
        <div class="ingredient-title">Dark Ingredients</div>
        <div class="ingredient-item">
            <div class="ingredient-icon"></div>
            Nightshade Essence
        </div>
        <div class="ingredient-item">
            <div class="ingredient-icon"></div>
            Toxic Vapor
        </div>
        <div class="ingredient-item">
            <div class="ingredient-icon"></div>
            Shadow Mist
        </div>
    </div>

    <script>
        // Sound Effects (Placeholder - Add actual audio files)
        const sounds = {
            hover: () => console.log('🔊 Hiss sound'),
            click: () => console.log('🔊 Bubble pop sound'),
            ambient: () => console.log('🔊 Ambient lair sounds')
        };

        // Initialize poison drips animation
        function createPoisonDrips() {
            const dripsContainer = document.getElementById('poisonDrips');
            
            setInterval(() => {
                const drip = document.createElement('div');
                drip.className = 'drip';
                drip.style.left = Math.random() * 100 + '%';
                drip.style.animationDelay = Math.random() * 2 + 's';
                drip.style.animationDuration = (6 + Math.random() * 4) + 's';
                
                // Random drip colors
                const colors = [
                    'linear-gradient(to bottom, rgba(0, 255, 0, 0.8), rgba(0, 255, 0, 0.1))',
                    'linear-gradient(to bottom, rgba(139, 0, 139, 0.8), rgba(139, 0, 139, 0.1))',
                    'linear-gradient(to bottom, rgba(255, 0, 255, 0.8), rgba(255, 0, 255, 0.1))'
                ];
                drip.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                dripsContainer.appendChild(drip);
                
                // Remove drip after animation
                setTimeout(() => {
                    if (dripsContainer.contains(drip)) {
                        dripsContainer.removeChild(drip);
                    }
                }, 8000);
            }, 1000 + Math.random() * 2000);
        }

        // Button hover effects with sound
        document.querySelectorAll('.poison-button').forEach(button => {

            });
            
            button.addEventListener('mouseleave', () => {
                button.style.filter = '';
            });
            
            button.addEventListener('click', () => {
                sounds.click();
                // Click animation
                button.style.transform = 'scale(0.95)';

        // Dynamic score updates
        function updateScores() {
            const diamondScore = document.querySelector('.score-item:first-child .score-number');
            const pointScore = document.querySelector('.score-item:last-child .score-number');
            
            // Simulate score changes with drip effect
            setInterval(() => {
                const currentDiamonds = parseInt(diamondScore.textContent);
                const currentPoints = parseInt(pointScore.textContent);
                
                // Random small increments
                if (Math.random() > 0.7) {
                    diamondScore.textContent = currentDiamonds + Math.floor(Math.random() * 5);
                    diamondScore.style.animation = 'numberDrip 1s ease-out';
                }
                
                if (Math.random() > 0.8) {
                    pointScore.textContent = currentPoints + Math.floor(Math.random() * 10);
                    pointScore.style.animation = 'numberDrip 1s ease-out';
                }
            }, 5000);
        }

        // Progress bar animation
        function animateProgressBar() {
            const progressBar = document.querySelector('.progress-bar');
            let progress = 67;
            
            setInterval(() => {
                progress += Math.random() * 2 - 1; // Random fluctuation
                progress = Math.max(10, Math.min(95, progress)); // Keep within bounds
                progressBar.style.width = progress + '%';
            }, 3000);
        }

        // Initialize everything when page loads
        window.addEventListener('load', () => {
            // Hide loading screen
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 2000);
            
            // Start animations
            createPoisonDrips();
            updateScores();
            animateProgressBar();
            
            // Start ambient sounds
            sounds.ambient();
            
            console.log('🧪 Alchemist\'s Lair loaded successfully!');

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {

                case '2': playWithFriends(); break;
                case '3': playOffline(); break;
                case 'p': showProfile(); break;
                case 'q': showQCD(); break;
                case 'r': showRewards(); break;
                case 'h': goHome(); break;
                case 'l': showRanking(); break;
                case 'Enter': case ' ': playGame(); break;
            }
        });

        // Performance optimization - Reduce animations on low-end devices
        if (navigator.hardwareConcurrency < 4) {
